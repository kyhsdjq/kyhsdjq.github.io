{% assign live2d = site.data.live2d %}
{% if live2d and live2d.enabled and live2d.model_path %}
  <script id="live2d-config" type="application/json">
    {
      "modelPath": {{ live2d.model_path | relative_url | jsonify }},
      "waifuScript": {{ '/assets/live2d/waifu-core.js' | relative_url | jsonify }},
      "waifuStyle": {{ '/assets/live2d/waifu.css' | relative_url | jsonify }},
      "cubism2Path": {{ '/assets/live2d/live2d.min.js' | relative_url | jsonify }},
      "cubism5Path": "https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js",
      "tools": {{ live2d.tools | jsonify }},
      "scale": {{ live2d.scale | default: 1 | jsonify }},
      "offsetX": {{ live2d.offset_x | default: 0 | jsonify }},
      "offsetY": {{ live2d.offset_y | default: 0 | jsonify }},
      "drag": {{ live2d.drag | default: false | jsonify }},
      "logLevel": {{ live2d.log_level | default: 'warn' | jsonify }},
      "mobileEnabled": {{ live2d.mobile.enabled | default: false | jsonify }},
      "mobileMaxWidth": {{ live2d.mobile.max_width | default: 768 | jsonify }}
    }
  </script>
  <script>
    (() => {
      const configElement = document.getElementById('live2d-config');
      if (!configElement?.textContent) {
        return;
      }

      const config = JSON.parse(configElement.textContent);

      const ensureStyle = (href) => {
        if (document.querySelector(`link[data-live2d-style="${href}"]`)) {
          return;
        }

        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = href;
        link.dataset.live2dStyle = href;
        document.head.appendChild(link);
      };

      const loadScript = (src) =>
        new Promise((resolve, reject) => {
          const existing = document.querySelector(`script[data-live2d-script="${src}"]`);
          if (existing) {
            if (window.initWidget) {
              resolve();
            } else {
              existing.addEventListener('load', () => resolve(), { once: true });
              existing.addEventListener('error', () => reject(new Error(`Failed to load ${src}`)), {
                once: true
              });
            }
            return;
          }

          const script = document.createElement('script');
          script.src = src;
          script.type = 'module';
          script.dataset.live2dScript = src;
          script.onload = () => resolve();
          script.onerror = () => reject(new Error(`Failed to load ${src}`));
          document.body.appendChild(script);
        });

      const shouldSkip = () => !config.mobileEnabled && window.innerWidth <= config.mobileMaxWidth;

      const start = async () => {
        if (shouldSkip()) {
          return;
        }

        try {
          const response = await fetch(config.modelPath, { cache: 'no-store' });
          if (!response.ok) {
            return;
          }

          ensureStyle(config.waifuStyle);
          await loadScript(config.waifuScript);

          if (window.initWidget && !document.getElementById('waifu-toggle')) {
            window.initWidget({
              modelPath: config.modelPath,
              cubism2Path: config.cubism2Path,
              cubism5Path: config.cubism5Path,
              tools: config.tools,
              scale: config.scale,
              offsetX: config.offsetX,
              offsetY: config.offsetY,
              drag: config.drag,
              logLevel: config.logLevel
            });
          }
        } catch (error) {
          console.warn('Live2D widget was not initialized.', error);
        }
      };

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', start, { once: true });
      } else {
        start();
      }
    })();
  </script>
{% endif %}
